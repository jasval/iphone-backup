name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release 2>&1

      - name: Run tests
        run: cargo test 2>&1

      - name: Clippy
        run: cargo clippy --release -- -W clippy::all -D warnings 2>&1
