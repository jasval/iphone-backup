name: Update Homebrew Tap

on:
  push:
    tags:
      - 'v*'

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Compute SHA256 of release tarball
        id: sha
        run: |
          SHA=$(curl -sL \
            "https://github.com/jasval/iphone-backup/archive/refs/tags/${{ steps.tag.outputs.version }}.tar.gz" \
            | sha256sum | awk '{print $1}')
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - name: Update formula in tap repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = '${{ steps.tag.outputs.version }}';
            const sha256  = '${{ steps.sha.outputs.sha256 }}';

            // Fetch current formula
            const { data: file } = await github.rest.repos.getContent({
              owner: 'jasval',
              repo:  'homebrew-iphone-backup',
              path:  'Formula/iphone-backup.rb',
            });

            let content = Buffer.from(file.content, 'base64').toString('utf8');

            // Replace url and sha256 lines
            content = content.replace(
              /url "https:\/\/github\.com\/jasval\/iphone-backup\/archive\/refs\/tags\/v[^"]+\.tar\.gz"/,
              `url "https://github.com/jasval/iphone-backup/archive/refs/tags/${version}.tar.gz"`
            );
            content = content.replace(
              /sha256 "[a-f0-9]{64}"/,
              `sha256 "${sha256}"`
            );

            // Commit the updated formula
            await github.rest.repos.createOrUpdateFileContents({
              owner:   'jasval',
              repo:    'homebrew-iphone-backup',
              path:    'Formula/iphone-backup.rb',
              message: `Update iphone-backup formula to ${version}`,
              content: Buffer.from(content).toString('base64'),
              sha:     file.sha,
            });

            console.log(`✓ Formula updated to ${version} (sha256: ${sha256})`);
