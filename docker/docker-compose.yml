services:
  iphone-backup:
    # Replace with your Docker Hub image name after pushing.
    # See README.md → Step 1 for build & push instructions.
    image: jasval/iphone-backup
    container_name: iphone-backup
    network_mode: host  # Required for mDNS/Bonjour LAN discovery; also exposes :8765
    volumes:
      - ${BACKUP_PATH:-/volume1/iphone-backups}:/backups
      - ${LOCKDOWN_PATH:-/volume1/iphone-backups/.lockdown}:/var/lib/lockdown
    environment:
      # Cron schedule – default 3 am daily
      - BACKUP_CRON=${BACKUP_CRON:-0 2 * * *}
      # Comma-separated Tailscale IPs of iPhones for remote/Tailscale backup
      # e.g. IPHONE_TAILSCALE_IPS=100.64.0.5,100.64.0.6
      - IPHONE_TAILSCALE_IPS=${IPHONE_TAILSCALE_IPS:-}
      - TZ=${TZ:-Europe/London}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
